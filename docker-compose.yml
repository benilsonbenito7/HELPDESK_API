services:
  backend:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    container_name: helpbackend
    volumes:
      - ./Backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - helpdesk_net

  db:
    image: postgres:15
    container_name: helpdb
    restart: always
    env_file:
      - .env
    volumes:
      - postgre_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgre_data:

networks:
  helpdesk_net:
    driver: bridge
